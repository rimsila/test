name: Verify MCP server

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-mcp.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extension/server/package-lock.json

      - name: Refresh public npm lockfile
        working-directory: extension/server
        run: npm install --package-lock-only --ignore-scripts --registry=https://registry.npmjs.org

      - name: Install dependencies
        working-directory: extension/server
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org

      - name: Check and smoke test
        working-directory: extension/server
        run: |
          npm run check
          npm run test:mcp

      - name: Commit verified lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/server/package-lock.json
          git rm .github/workflows/verify-mcp.yml
          git commit -m "test: verify MCP server and refresh lockfile"
          git push
