<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .todo-app {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
    }

    .todo-form {
      display: flex;
      gap: 10px;
    }

    .todo-form input {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    .todo-form input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .add-button {
      padding: 0 18px;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    .todo-list {
      list-style: none;
      padding: 0;
      margin: 22px 0 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .todo-item:last-child {
      border-bottom: 0;
    }

    .todo-text {
      flex: 1;
      word-break: break-word;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-button {
      padding: 7px 10px;
      background: #fee2e2;
      color: #b91c1c;
    }

    .empty-message {
      margin: 22px 0 0;
      text-align: center;
      color: #6b7280;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      color: #6b7280;
      font-size: 14px;
    }

    .clear-button {
      padding: 8px 11px;
      background: #e5e7eb;
      color: #374151;
    }
  </style>
</head>
<body>
  <main class="todo-app">
    <h1>Todo App</h1>

    <form id="todoForm" class="todo-form">
      <input
        id="todoInput"
        type="text"
        placeholder="Enter a task..."
        autocomplete="off"
        required
      />
      <button class="add-button" type="submit">Add</button>
    </form>

    <p id="emptyMessage" class="empty-message">No tasks yet.</p>
    <ul id="todoList" class="todo-list"></ul>

    <div class="footer">
      <span id="taskCount">0 tasks remaining</span>
      <button id="clearCompleted" class="clear-button" type="button">
        Clear completed
      </button>
    </div>
  </main>

  <script>
    const todoForm = document.getElementById('todoForm');
    const todoInput = document.getElementById('todoInput');
    const todoList = document.getElementById('todoList');
    const emptyMessage = document.getElementById('emptyMessage');
    const taskCount = document.getElementById('taskCount');
    const clearCompletedButton = document.getElementById('clearCompleted');

    let todos = loadTodos();

    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem('todos')) || [];
      } catch {
        return [];
      }
    }

    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function renderTodos() {
      todoList.innerHTML = '';

      todos.forEach((todo) => {
        const item = document.createElement('li');
        item.className = `todo-item${todo.completed ? ' completed' : ''}`;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.completed;
        checkbox.setAttribute('aria-label', `Mark ${todo.text} as completed`);
        checkbox.addEventListener('change', () => toggleTodo(todo.id));

        const text = document.createElement('span');
        text.className = 'todo-text';
        text.textContent = todo.text;

        const deleteButton = document.createElement('button');
        deleteButton.className = 'delete-button';
        deleteButton.type = 'button';
        deleteButton.textContent = 'Delete';
        deleteButton.addEventListener('click', () => deleteTodo(todo.id));

        item.append(checkbox, text, deleteButton);
        todoList.appendChild(item);
      });

      const remaining = todos.filter((todo) => !todo.completed).length;
      taskCount.textContent = `${remaining} ${remaining === 1 ? 'task' : 'tasks'} remaining`;
      emptyMessage.hidden = todos.length > 0;
      clearCompletedButton.disabled = !todos.some((todo) => todo.completed);
    }

    function addTodo(text) {
      todos.unshift({
        id: Date.now(),
        text,
        completed: false
      });

      saveTodos();
      renderTodos();
    }

    function toggleTodo(id) {
      todos = todos.map((todo) =>
        todo.id === id ? { ...todo, completed: !todo.completed } : todo
      );

      saveTodos();
      renderTodos();
    }

    function deleteTodo(id) {
      todos = todos.filter((todo) => todo.id !== id);
      saveTodos();
      renderTodos();
    }

    todoForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const text = todoInput.value.trim();
      if (!text) return;

      addTodo(text);
      todoInput.value = '';
      todoInput.focus();
    });

    clearCompletedButton.addEventListener('click', () => {
      todos = todos.filter((todo) => !todo.completed);
      saveTodos();
      renderTodos();
    });

    renderTodos();
  </script>
</body>
</html>
